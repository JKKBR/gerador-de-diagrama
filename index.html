<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Diagrama</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      text-align: center;
    }
    #workspace {
      position: relative;
      width: 900px;
      height: 500px;
      margin: 20px auto;
      border: 2px solid #00cc88;
      background: #1a1a1a;
      overflow: hidden;
    }
    .shape {
      position: absolute;
      padding: 20px;
      background: #00cc88;
      color: #fff;
      border-radius: 6px;
      cursor: move;
      user-select: none;
      text-align: center;
    }
    .circle {
      border-radius: 50%;
      width: 100px;
      height: 100px;
      line-height: 60px;
    }
    svg {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
    button {
      background: #00cc88;
      color: #fff;
      border: none;
      padding: 10px 15px;
      margin: 5px;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: #009966;
    }
  </style>
</head>
<body>
  <h1>Gerador de Diagrama</h1>
  <button onclick="addRect()">Adicionar Retângulo</button>
  <button onclick="addCircle()">Adicionar Círculo</button>
  <button onclick="connectShapes()">Conectar Últimas Formas</button>
  <button onclick="savePNG()">Salvar em PNG</button>

  <div id="workspace">
    <svg id="connections" width="900" height="500"></svg>
  </div>

  <script>
    const workspace = document.getElementById("workspace");
    const svg = document.getElementById("connections");
    let shapes = [];
    let connections = [];

    function addRect() {
      const box = document.createElement("div");
      box.className = "shape";
      box.innerText = "Retângulo";
      box.style.left = "20px";
      box.style.top = (20 + shapes.length * 70) + "px";
      workspace.appendChild(box);
      shapes.push(box);
      makeDraggable(box);
    }

    function addCircle() {
      const box = document.createElement("div");
      box.className = "shape circle";
      box.innerText = "Círculo";
      box.style.left = "200px";
      box.style.top = (20 + shapes.length * 70) + "px";
      workspace.appendChild(box);
      shapes.push(box);
      makeDraggable(box);
    }

    function makeDraggable(el) {
      let offsetX, offsetY;
      el.onmousedown = function(e) {
        offsetX = e.offsetX;
        offsetY = e.offsetY;

        function moveAt(ev) {
          el.style.left = ev.pageX - workspace.offsetLeft - offsetX + "px";
          el.style.top = ev.pageY - workspace.offsetTop - offsetY + "px";
          updateConnections();
        }

        function onMouseMove(ev) { moveAt(ev); }
        document.addEventListener("mousemove", onMouseMove);

        el.onmouseup = function() {
          document.removeEventListener("mousemove", onMouseMove);
          el.onmouseup = null;
        };
      };
    }

    function connectShapes() {
      if (shapes.length < 2) return;
      const from = shapes[shapes.length - 2];
      const to = shapes[shapes.length - 1];
      connections.push({ from, to });
      updateConnections();
    }

    function updateConnections() {
      svg.innerHTML = "";
      const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
      const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
      marker.setAttribute("id", "arrow");
      marker.setAttribute("markerWidth", "10");
      marker.setAttribute("markerHeight", "10");
      marker.setAttribute("refX", "5");
      marker.setAttribute("refY", "5");
      marker.setAttribute("orient", "auto");
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", "M0,0 L10,5 L0,10 Z");
      path.setAttribute("fill", "#00cc88");
      marker.appendChild(path);
      defs.appendChild(marker);
      svg.appendChild(defs);

      connections.forEach(c => {
        const rect1 = c.from.getBoundingClientRect();
        const rect2 = c.to.getBoundingClientRect();
        const ws = workspace.getBoundingClientRect();

        const x1 = rect1.left - ws.left + rect1.width/2;
        const y1 = rect1.top - ws.top + rect1.height/2;
        const x2 = rect2.left - ws.left + rect2.width/2;
        const y2 = rect2.top - ws.top + rect2.height/2;

        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", x1);
        line.setAttribute("y1", y1);
        line.setAttribute("x2", x2);
        line.setAttribute("y2", y2);
        line.setAttribute("stroke", "#00cc88");
        line.setAttribute("stroke-width", "2");
        line.setAttribute("marker-end", "url(#arrow)");
        svg.appendChild(line);
      });
    }

    function savePNG() {
      html2canvas(workspace).then(canvas => {
        const link = document.createElement("a");
        link.download = "diagrama.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }
  </script>
  <!-- Biblioteca para exportar em PNG -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
