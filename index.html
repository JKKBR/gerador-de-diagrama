<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Diagrama</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0d0d0d; color: #e0e0e0; text-align: center; }
    #workspace { position: relative; width: 900px; height: 500px; margin: 20px auto; border: 2px solid #00cc88; background: #1a1a1a; }
    .shape { position: absolute; padding: 20px; border-radius: 6px; cursor: move; user-select: none; text-align: center; }
    .circle { border-radius: 50%; width: 100px; height: 100px; line-height: 60px; }
    .selected { outline: 3px solid yellow; }
    .controls { margin-top: 5px; display: block; }
    svg { position: absolute; top: 0; left: 0; pointer-events: none; }
    button, select, input { margin: 5px; padding: 8px; border-radius: 5px; border: none; }
    button { background: #00cc88; color: #fff; cursor: pointer; }
    button:hover { background: #009966; }
  </style>
</head>
<body>
  <h1>Gerador de Diagrama</h1>
  
  <!-- Paletas globais -->
  <label>Fonte:</label>
  <select id="fontPicker" onchange="updateStyle()">
    <option value="Arial">Arial</option>
    <option value="Poppins">Poppins</option>
    <option value="Courier New">Courier New</option>
    <option value="Georgia">Georgia</option>
    <option value="Verdana">Verdana</option>
  </select>
  
  <label>Cor das setas:</label>
  <input type="color" id="arrowColor" value="#00cc88" onchange="updateConnections()">
  
  <label>Cor do fundo:</label>
  <input type="color" id="bgColorPicker" value="#1a1a1a" onchange="updateBackground()">
  
  <br>
  <button onclick="addRect()">Adicionar Retângulo</button>
  <button onclick="addCircle()">Adicionar Círculo</button>
  <button onclick="connectSelected()">Conectar Selecionados</button>
  <button onclick="deleteSelected()">Excluir Selecionado</button>
  <button onclick="savePNG()">Salvar em PNG</button>

  <div id="workspace">
    <svg id="connections" width="900" height="500"></svg>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    const workspace = document.getElementById("workspace");
    const svg = document.getElementById("connections");
    let shapes = [];
    let connections = [];
    let selectedShapes = [];

    function addRect() { createShape("Retângulo", "shape"); }
    function addCircle() { createShape("Círculo", "shape circle"); }

    function createShape(text, className) {
      const box = document.createElement("div");
      box.className = className;
      box.innerText = text;
      box.style.left = "20px";
      box.style.top = (20 + shapes.length * 70) + "px";
      box.style.fontFamily = document.getElementById("fontPicker").value;

      // seletor de cor individual
      const colorInput = document.createElement("input");
      colorInput.type = "color";
      colorInput.value = "#00cc88";
      colorInput.className = "controls";
      colorInput.onchange = () => { box.style.background = colorInput.value; };
      box.appendChild(colorInput);

      workspace.appendChild(box);
      shapes.push(box);
      makeInteractive(box);
    }

    function updateStyle() {
      shapes.forEach(el => { el.style.fontFamily = document.getElementById("fontPicker").value; });
      updateConnections();
    }

    function updateBackground() { workspace.style.background = document.getElementById("bgColorPicker").value; }

    function makeInteractive(el) {
      let offsetX, offsetY;

      // Clique simples para selecionar
      el.onclick = function(e) {
        if (e.target.tagName === "INPUT") return; // não selecionar ao clicar no input de cor
        toggleSelect(el);
      };

      // Botão direito para renomear
      el.oncontextmenu = function(e) {
        e.preventDefault();
        const novoTexto = prompt("Digite o novo texto:", el.innerText.replace(/\n.*/, ""));
        if (novoTexto) { el.childNodes[0].nodeValue = novoTexto; }
      };

      // Arrastar
      el.onmousedown = function(e) {
        if (e.button !== 0) return;
        offsetX = e.offsetX;
        offsetY = e.offsetY;
        function moveAt(ev) {
          el.style.left = ev.pageX - workspace.offsetLeft - offsetX + "px";
          el.style.top = ev.pageY - workspace.offsetTop - offsetY + "px";
          updateConnections();
        }
        function onMouseMove(ev) { moveAt(ev); }
        document.addEventListener("mousemove", onMouseMove);
        el.onmouseup = function() {
          document.removeEventListener("mousemove", onMouseMove);
          el.onmouseup = null;
        };
      };
    }

    function toggleSelect(el) {
      if (selectedShapes.includes(el)) {
        el.classList.remove("selected");
        selectedShapes = selectedShapes.filter(s => s !== el);
      } else {
        el.classList.add("selected");
        selectedShapes.push(el);
      }
    }

    function connectSelected() {
      if (selectedShapes.length === 2) {
        const from = selectedShapes[0]; // origem
        const to = selectedShapes[1];   // destino (última selecionada)
        connections.push({ from, to });
        updateConnections();
        selectedShapes.forEach(s => s.classList.remove("selected"));
        selectedShapes = [];
      } else {
        alert("Selecione exatamente 2 formas.");
      }
    }

    function deleteSelected() {
      if (selectedShapes.length === 1) {
        const el = selectedShapes[0];
        workspace.removeChild(el);
        shapes = shapes.filter(s => s !== el);
        connections = connections.filter(c => c.from !== el && c.to !== el);
        selectedShapes = [];
        updateConnections();
      } else {
        alert("Selecione uma forma para excluir.");
      }
    }

    function updateConnections() {
      svg.innerHTML = "";
      const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
      const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
      marker.setAttribute("id", "arrow");
      marker.setAttribute("markerWidth", "10");
      marker.setAttribute("markerHeight", "10");
      marker.setAttribute("refX", "10");
      marker.setAttribute("refY", "5");
      marker.setAttribute("orient", "auto");
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", "M0,0 L10,5 L0,10 Z");
      path.setAttribute("fill", document.getElementById("arrowColor").value);
      marker.appendChild(path);
      defs.appendChild(marker);
      svg.appendChild(defs);

      connections.forEach(c => {
        const rect1 = c.from.getBoundingClientRect();
        const rect2 = c.to.getBoundingClientRect();
        const ws = workspace.getBoundingClientRect();
        const x1 = rect1.left - ws.left + rect1.width/2;
        const y1 = rect1.top - ws.top + rect1.height/2;
        const x2 = rect2.left - ws.left + rect2.width/2;
        const y2 = rect2.top - ws.top + rect2.height/2;
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", x1);
        line.setAttribute("y1", y1);
        line.setAttribute("x2", x2);
        line.setAttribute("y2", y2);
        line.setAttribute("stroke", document.getElementById("arrowColor").value);
        line.setAttribute("stroke-width", "2");
        line.setAttribute("marker-end", "url(#arrow)");
        svg.appendChild(line);
      });
    }
